# ────────────────────────────────────────────────────────────────
# Dolphin Platform V2 — Conda Environment
# ────────────────────────────────────────────────────────────────
# Usage:
#   conda env create -f environment.yml
#   conda activate dolphin
# ────────────────────────────────────────────────────────────────

name: dolphin

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - rdkit=2023.09                # Conda-native RDKit (preferred over pip)
  - numpy=1.26.4
  - pandas=2.2.2
  - matplotlib=3.9.0
  - openpyxl=3.1.5
  - xlrd>=2.0.1
  - pillow>=10.0.0
  - pip

  # Everything else via pip (no conda package available / exact version pinning)
  - pip:
      - flask==3.0.3
      - SQLAlchemy==2.0.30
      - psycopg2-binary==2.9.9
      - gunicorn==22.0.0
      - httpx==0.27.0
      - pydantic==2.8.2
      - python-dotenv==1.0.1
      - cirpy==1.0.2
      - requests>=2.32.0
      - pydantic-settings>=2.3.4
      - smbprotocol==1.15.0
      - pymupdf>=1.24.0
      - portkey-ai>=1.0.0
      # Dev / test
      - ruff>=0.4.0
      - mypy>=1.10
      - pytest>=8.0
      - pytest-cov>=5.0
      - jupyterlab>=4.2
