{% extends "lc_ms/base_lcms.html" %}
{% block content %}
<div class="section-header">
  <h1>IPC File Generator</h1>
</div>

<div class="card">
  <form action="{{ url_for('lc_ms_api.generate_ipc') }}" method="post" class="form">
    <div id="ipcRows">
      {% if prefill_rows %}
      {% for row in prefill_rows %}
      <div class="row-inline" style="margin-bottom: 10px; align-items: flex-end;">
        <label style="flex: 2;">
          <span>ELN ID</span>
          <input name="eln_id[]" placeholder="ELN…" value="{{ row.eln }}"
            class="{{ 'field-error' if row.status != 'ok' else '' }}" required>
        </label>
        <label style="flex: 1;">
          <span>IPC no.</span>
          <input name="exp_no[]" placeholder="1" value="{{ row.exp }}" required>
        </label>
        <label style="flex: 1;">
          <span>Duration (h)</span>
          <input name="duration_h[]" placeholder="1" value="{{ row.dur }}" required>
        </label>
        <button type="button" class="btn ghost" onclick="removeIpcRow(this)" style="margin-bottom: 10px;">✕</button>
      </div>
      {% endfor %}
      {% else %}
      <div class="row-inline" style="margin-bottom: 10px; align-items: flex-end;">
        <label style="flex: 2;">
          <span>ELN ID</span>
          <input name="eln_id[]" placeholder="ELN…" required>
        </label>
        <label style="flex: 1;">
          <span>IPC no.</span>
          <input name="exp_no[]" placeholder="1" value="1" required>
        </label>
        <label style="flex: 1;">
          <span>Duration (h)</span>
          <input name="duration_h[]" placeholder="1" value="1" required>
        </label>
        <button type="button" class="btn ghost" onclick="removeIpcRow(this)" style="margin-bottom: 10px;">✕</button>
      </div>
      {% endif %}
    </div>

    <div class="actions" style="margin-top: 16px;">
      <button type="button" class="btn secondary" onclick="addIpcRow()">+ Add Row</button>
      <button type="submit" class="btn">Generate IPC File</button>
    </div>
  </form>
  <div style="margin-top: 10px; font-size: 12px; color: var(--muted);">Output filename: <code>{USER_ID}_IPC.txt</code>
  </div>
</div>

<script src="{{ url_for('lc_ms.static', filename='script.js') }}"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const form = document.querySelector('form.form');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = form.querySelector('button[type="submit"]');
        if (btn) { btn.disabled = true; btn.textContent = 'Generating...'; }
        try {
          const r = await fetch(form.action, { method: 'POST', body: new FormData(form) });
          const data = await r.json().catch(() => ({}));
          if (!r.ok || data.error) alert(data.error || 'Server error');
          else alert(data.message || 'Saved successfully');
        } catch (err) {
          alert('Network error');
        } finally {
          if (btn) { btn.disabled = false; btn.textContent = 'Generate IPC File'; }
        }
      });
    }
  });
</script>
{% endblock %}
